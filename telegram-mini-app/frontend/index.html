<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width,
                   initial-scale=1.0,
                   maximum-scale=1.0,
                   user-scalable=no">

    <title>AquaLife Store</title>

    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {

            font-family:
                -apple-system,
                BlinkMacSystemFont,
                "Segoe UI",
                Roboto,
                Arial,
                sans-serif;

            background:
                var(--tg-theme-bg-color, #ffffff);

            color:
                var(--tg-theme-text-color, #000000);

            padding: 16px;

            padding-bottom: 100px;

        }


        /* =========================
           HEADER
        ========================= */

        .header {

            text-align: center;

            margin-bottom: 20px;

        }

        .header h1 {

            font-size: 24px;

            color: #0077c8;

            margin-bottom: 5px;

        }

        .header p {

            font-size: 14px;

            opacity: 0.7;

        }


        /* =========================
           PRODUCT GRID
        ========================= */

        .product-grid {

            display: grid;

            grid-template-columns:
                repeat(2, 1fr);

            gap: 16px;

        }


        /* =========================
           PRODUCT CARD
        ========================= */

        .product-card {

            background: var(
                --tg-theme-secondary-bg-color,
                #f5f5f5
            );

            border-radius: 16px;

            padding: 12px;

            text-align: center;

            box-shadow:
                0 2px 8px
                rgba(0,0,0,0.08);

        }


        .product-image {

            width: 100%;

            height: 110px;

            display: flex;

            justify-content: center;

            align-items: center;

            margin-bottom: 10px;

        }


        .product-image img {

            max-width: 100%;

            max-height: 100%;

            object-fit: contain;

        }


        /* Product image fallback */

        .product-placeholder {

            font-size: 55px;

        }


        .product-code {

            font-size: 12px;

            color: #777;

            margin-bottom: 4px;

        }


        .product-name {

            font-size: 15px;

            font-weight: bold;

            min-height: 40px;

            display: flex;

            justify-content: center;

            align-items: center;

        }


        .product-price {

            font-size: 18px;

            font-weight: bold;

            color: #0077c8;

            margin: 8px 0;

        }


        /* =========================
           ADD BUTTON
        ========================= */

        .add-button {

            width: 100%;

            border: none;

            border-radius: 10px;

            padding: 10px;

            background: #0077c8;

            color: white;

            font-size: 14px;

            font-weight: bold;

            cursor: pointer;

        }


        .add-button:active {

            transform: scale(0.96);

        }


        /* =========================
           QUANTITY CONTROLS
        ========================= */

        .quantity-control {

            display: none;

            align-items: center;

            justify-content: space-between;

            gap: 8px;

        }


        .quantity-button {

            width: 34px;

            height: 34px;

            border: none;

            border-radius: 8px;

            background: #0077c8;

            color: white;

            font-size: 20px;

            font-weight: bold;

        }


        .quantity-number {

            font-size: 17px;

            font-weight: bold;

            flex: 1;

            text-align: center;

        }


        /* =========================
           CART SUMMARY
        ========================= */

        .cart-summary {

            display: none;

            position: fixed;

            bottom: 0;

            left: 0;

            right: 0;

            padding: 12px 16px;

            background: var(
                --tg-theme-bg-color,
                #ffffff
            );

            border-top:

                1px solid

                var(
                    --tg-theme-hint-color,
                    #dddddd
                );

            z-index: 100;

        }


        .cart-info {

            display: flex;

            justify-content: space-between;

            margin-bottom: 8px;

            font-weight: bold;

        }


        .view-cart-button {

            width: 100%;

            padding: 13px;

            border: none;

            border-radius: 12px;

            background: #31b545;

            color: white;

            font-size: 16px;

            font-weight: bold;

        }


        /* =========================
           CART MODAL
        ========================= */

        .modal {

            display: none;

            position: fixed;

            z-index: 200;

            left: 0;

            top: 0;

            width: 100%;

            height: 100%;

            background: rgba(0,0,0,0.5);

        }


        .modal-content {

            position: absolute;

            bottom: 0;

            width: 100%;

            max-height: 85%;

            overflow-y: auto;

            background:
                var(--tg-theme-bg-color, #ffffff);

            border-radius:

                20px 20px 0 0;

            padding: 20px;

        }


        .modal-header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 15px;

        }


        .modal-header h2 {

            font-size: 21px;

        }


        .close-button {

            font-size: 28px;

            border: none;

            background: none;

            cursor: pointer;

        }


        .cart-item {

            display: flex;

            justify-content: space-between;

            align-items: center;

            padding: 12px 0;

            border-bottom: 1px solid #ddd;

        }


        .cart-item-name {

            flex: 1;

        }


        .cart-item-name strong {

            display: block;

        }


        .cart-item-name small {

            opacity: 0.7;

        }


        .cart-item-total {

            font-weight: bold;

            margin-left: 10px;

        }


        .total-section {

            display: flex;

            justify-content: space-between;

            font-size: 20px;

            font-weight: bold;

            margin-top: 20px;

            margin-bottom: 20px;

        }


        .confirm-button {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 12px;

            background: #31b545;

            color: white;

            font-size: 17px;

            font-weight: bold;

        }


        .cancel-button {

            width: 100%;

            padding: 12px;

            margin-top: 8px;

            border: none;

            border-radius: 12px;

            background: #eeeeee;

            color: #333;

            font-size: 15px;

        }

    </style>

</head>


<body>


    <!-- =========================
         HEADER
    ========================= -->

    <div class="header">

        <h1>💧 AquaLife Cambodia</h1>

        <p>Water Purifier Products</p>

    </div>


    <!-- =========================
         PRODUCT GRID
    ========================= -->

    <div
        class="product-grid"
        id="productGrid">

    </div>


    <!-- =========================
         BOTTOM CART
    ========================= -->

    <div
        class="cart-summary"
        id="cartSummary">

        <div class="cart-info">

            <span id="cartItems">

                0 Items

            </span>


            <span id="cartTotal">

                $0

            </span>

        </div>


        <button
            class="view-cart-button"
            onclick="openCart()">

            🛒 VIEW CART

        </button>

    </div>


    <!-- =========================
         CART MODAL
    ========================= -->

    <div
        class="modal"
        id="cartModal">

        <div class="modal-content">


            <div class="modal-header">

                <h2>🛒 Your Order</h2>


                <button
                    class="close-button"
                    onclick="closeCart()">

                    ×

                </button>

            </div>


            <div
                id="cartItemsList">

            </div>


            <div
                class="total-section">

                <span>Total</span>


                <span
                    id="modalTotal">

                    $0

                </span>

            </div>


            <button
                class="confirm-button"
                onclick="confirmOrder()">

                ✅ CONFIRM ORDER

            </button>


            <button
                class="cancel-button"
                onclick="closeCart()">

                Continue Shopping

            </button>


        </div>

    </div>


    <script>


        // ==========================================
        // TELEGRAM INITIALIZATION
        // ==========================================

        const tg =
            window.Telegram.WebApp;


        tg.ready();


        tg.expand();


        // ==========================================
        // PRODUCT CATALOG
        // ==========================================

        const products = [

            {
                id: "1",
                code: "SU-G",
                name: "SAENG SU (TT)",
                price: 449
            },

            {
                id: "2",
                code: "SU(FS)-G",
                name: "SAENG SU (FS)",
                price: 499
            },

            {
                id: "3",
                code: "MNL(FS)-W",
                name: "MNL(FS) - WHITE",
                price: 799
            },

            {
                id: "4",
                code: "SC",
                name: "SUPER COOLING",
                price: 1188
            },

            {
                id: "5",
                code: "JS-V3",
                name: "JICO",
                price: 219
            },

            {
                id: "6",
                code: "RKT5000",
                name: "ROKKET 5000",
                price: 399
            },

            {
                id: "7",
                code: "RKT8000",
                name: "ROKKET 8000",
                price: 449
            },

            {
                id: "8",
                code: "RKT10000",
                name: "ROKKET 10000",
                price: 549
            },

            {
                id: "9",
                code: "CANNON",
                name: "CANNON",
                price: 249
            },

            {
                id: "10",
                code: "JS-VT",
                name: "TRICO",
                price: 219
            },

            {
                id: "11",
                code: "MINI-S (HWC)",
                name: "MINI-S (HWC)",
                price: 1188
            },

            {
                id: "12",
                code: "MINI-S (HW)",
                name: "MINI-S (HW)",
                price: 1188
            },

            {
                id: "13",
                code: "JS-V2",
                name: "NOVA",
                price: 199
            }

        ];


        // ==========================================
        // CART
        // ==========================================

        let cart = {};


        // ==========================================
        // DISPLAY PRODUCTS
        // ==========================================

        function displayProducts() {


            const grid =
                document.getElementById(
                    "productGrid"
                );


            grid.innerHTML = "";


            products.forEach(product => {


                const card =
                    document.createElement(
                        "div"
                    );


                card.className =
                    "product-card";


                card.innerHTML = `

                    <div class="product-image">

                        <div
                            class="product-placeholder">

                            💧

                        </div>

                    </div>


                    <div
                        class="product-code">

                        ${product.code}

                    </div>


                    <div
                        class="product-name">

                        ${product.name}

                    </div>


                    <div
                        class="product-price">

                        $${product.price}

                    </div>


                    <button
                        class="add-button"
                        id="add-${product.id}"
                        onclick="addToCart('${product.id}')">

                        ADD TO CART

                    </button>


                    <div
                        class="quantity-control"
                        id="quantity-${product.id}">


                        <button
                            class="quantity-button"
                            onclick="changeQuantity('${product.id}', -1)">

                            −

                        </button>


                        <span
                            class="quantity-number"
                            id="qty-${product.id}">

                            0

                        </span>


                        <button
                            class="quantity-button"
                            onclick="changeQuantity('${product.id}', 1)">

                            +

                        </button>


                    </div>

                `;


                grid.appendChild(card);


            });

        }


        // ==========================================
        // ADD TO CART
        // ==========================================

        function addToCart(productId) {


            if (!cart[productId]) {

                cart[productId] = 1;

            }

            else {

                cart[productId]++;

            }


            updateProductUI(productId);


            updateCartSummary();

        }


        // ==========================================
        // CHANGE QUANTITY
        // ==========================================

        function changeQuantity(
            productId,
            change
        ) {


            cart[productId] =
                (cart[productId] || 0)
                + change;


            if (
                cart[productId] <= 0
            ) {

                delete cart[productId];

            }


            updateProductUI(productId);


            updateCartSummary();

        }


        // ==========================================
        // UPDATE PRODUCT UI
        // ==========================================

        function updateProductUI(
            productId
        ) {


            const addButton =
                document.getElementById(
                    `add-${productId}`
                );


            const quantityControl =
                document.getElementById(
                    `quantity-${productId}`
                );


            const quantityText =
                document.getElementById(
                    `qty-${productId}`
                );


            const quantity =
                cart[productId] || 0;


            if (quantity > 0) {


                addButton.style.display =
                    "none";


                quantityControl.style.display =
                    "flex";


                quantityText.innerText =
                    quantity;

            }

            else {


                addButton.style.display =
                    "block";


                quantityControl.style.display =
                    "none";


                quantityText.innerText =
                    "0";

            }

        }


        // ==========================================
        // CALCULATE TOTAL ITEMS
        // ==========================================

        function getTotalItems() {


            return Object.values(cart)

                .reduce(

                    (total, quantity) =>

                        total + quantity,

                    0

                );

        }


        // ==========================================
        // CALCULATE TOTAL PRICE
        // ==========================================

        function getTotalPrice() {


            let total = 0;


            for (
                const productId
                in cart
            ) {


                const product =
                    products.find(

                        item =>

                            item.id ===
                            productId

                    );


                if (product) {


                    total +=

                        product.price *
                        cart[productId];

                }

            }


            return total;

        }


        // ==========================================
        // UPDATE CART SUMMARY
        // ==========================================

        function updateCartSummary() {


            const totalItems =
                getTotalItems();


            const totalPrice =
                getTotalPrice();


            const cartSummary =
                document.getElementById(
                    "cartSummary"
                );


            document.getElementById(
                "cartItems"
            ).innerText =

                `${totalItems} Item${
                    totalItems !== 1
                    ? "s"
                    : ""
                }`;


            document.getElementById(
                "cartTotal"
            ).innerText =

                `$${totalPrice.toLocaleString()}`;


            if (totalItems > 0) {


                cartSummary.style.display =
                    "block";

            }

            else {


                cartSummary.style.display =
                    "none";

            }

        }


        // ==========================================
        // OPEN CART
        // ==========================================

        function openCart() {


            const modal =
                document.getElementById(
                    "cartModal"
                );


            const list =
                document.getElementById(
                    "cartItemsList"
                );


            list.innerHTML = "";


            for (
                const productId
                in cart
            ) {


                const quantity =
                    cart[productId];


                const product =
                    products.find(

                        item =>

                            item.id ===
                            productId

                    );


                if (!product) {

                    continue;

                }


                const lineTotal =
                    product.price *
                    quantity;


                const item =
                    document.createElement(
                        "div"
                    );


                item.className =
                    "cart-item";


                item.innerHTML = `

                    <div
                        class="cart-item-name">

                        <strong>

                            ${product.name}

                        </strong>


                        <small>

                            ${product.code}
                            × ${quantity}

                        </small>

                    </div>


                    <div
                        class="cart-item-total">

                        $${lineTotal.toLocaleString()}

                    </div>

                `;


                list.appendChild(item);

            }


            document.getElementById(
                "modalTotal"
            ).innerText =

                `$${getTotalPrice().toLocaleString()}`;


            modal.style.display =
                "block";

        }


        // ==========================================
        // CLOSE CART
        // ==========================================

        function closeCart() {


            document.getElementById(
                "cartModal"
            ).style.display =

                "none";

        }


        // ==========================================
        // CONFIRM ORDER
        // ==========================================

        function confirmOrder() {


            if (
                getTotalItems() <= 0
            ) {


                alert(
                    "Your cart is empty."
                );


                return;

            }


            // ======================================
            // IMPORTANT:
            // Format matches your Python backend
            // ======================================

            const orderData = {


                products: Object.keys(cart)

                    .map(productId => {


                        const product =
                            products.find(

                                item =>

                                    item.id ===
                                    productId

                            );


                        return {


                            id: productId,


                            quantity:
                                cart[productId],


                            name:
                                product.name,


                            price:
                                `$${product.price}`

                        };


                    })

            };


            console.log(
                "ORDER DATA SENT TO BOT:",
                orderData
            );


            // Send order to Telegram bot

            tg.sendData(

                JSON.stringify(
                    orderData
                )

            );


            // Close Mini App

            tg.close();

        }


        // ==========================================
        // START APP
        // ==========================================

        displayProducts();


        updateCartSummary();


    </script>

</body>

</html>
