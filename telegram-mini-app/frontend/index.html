<script>
const tg = window.Telegram.WebApp;

tg.expand();
tg.ready();

tg.MainButton.setText("VIEW ORDER");
tg.MainButton.setTextColor("#FFFFFF");
tg.MainButton.setBackgroundColor("#31b545");

let cart = {};

function addToCart(id) {
    cart[id] = 1;

    updateUI(id);
    updateMainButton();
}

function changeQty(id, delta) {

    cart[id] = (cart[id] || 0) + delta;

    if (cart[id] <= 0) {
        delete cart[id];
    }

    updateUI(id);
    updateMainButton();
}

function updateUI(id) {

    const card = document.getElementById(`card-${id}`);

    if (!card) return;

    const btnAdd = card.querySelector(".btn-add");

    const counter = document.getElementById(
        `counter-${id}`
    );

    const qtyText = document.getElementById(
        `qty-${id}`
    );


    if (cart[id] > 0) {

        btnAdd.style.display = "none";

        counter.style.display = "flex";

        qtyText.innerText = cart[id];

    } else {

        btnAdd.style.display = "block";

        counter.style.display = "none";

    }

}


function updateMainButton() {

    const totalItems = Object.values(cart)

        .reduce(

            (total, quantity) =>

                total + quantity,

            0

        );


    if (totalItems > 0) {

        tg.MainButton.show();

    } else {

        tg.MainButton.hide();

    }

}


/* ======================================
   SEND REAL ORDER TO BACKEND
====================================== */

tg.MainButton.onClick(function () {


    const products = [];


    for (

        const productId in cart

    ) {


        products.push({

            id: productId,

            quantity: cart[productId]

        });

    }


    const orderData = {

        products: products

    };


    console.log(

        "SENDING ORDER:",

        orderData

    );


    tg.sendData(

        JSON.stringify(

            orderData

        )

    );


    tg.close();

});
</script>
