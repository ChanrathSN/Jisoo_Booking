<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AquaLife Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);padding:16px 16px 90px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;color:#0077c8}
.header p{font-size:13px;opacity:.7;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 14px}
.card{text-align:center;display:flex;flex-direction:column;align-items:center}
.image{width:120px;height:120px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;background:#f5f7f9;overflow:hidden}
.image img{max-width:100%;max-height:100%;object-fit:contain}
.product-code{font-size:12px;color:#0077c8;font-weight:700}
.name{font-size:14px;font-weight:600;min-height:38px;margin-top:3px}
.price{font-size:15px;font-weight:700;margin:5px 0 9px}
.add{width:100%;max-width:130px;padding:9px;background:#0077c8;color:#fff;border:0;border-radius:9px;font-weight:700;font-size:14px}
.counter{display:none;width:100%;max-width:130px;align-items:center;justify-content:space-between}
.counter button{width:36px;height:36px;border:0;border-radius:8px;background:#0077c8;color:#fff;font-size:20px;font-weight:bold}
.qty{font-size:16px;font-weight:bold}
</style>
</head>
<body>
<div class="header">
<h1>AquaLife Store 💧</h1>
<p>Select products and quantity</p>
</div>
<div class="grid" id="productGrid"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const products = [
{id:"1",code:"SU-G",name:"SAENG SU (TT)",price:449},
{id:"2",code:"SU(FS)-G",name:"SAENG SU (FS)",price:499},
{id:"3",code:"MNL(FS)-W",name:"MNL(FS) - WHITE",price:799},
{id:"4",code:"SC",name:"SUPER COOLING",price:1188},
{id:"5",code:"JS-V3",name:"JICO",price:219},
{id:"6",code:"RKT5000",name:"ROKKET 5000",price:399},
{id:"7",code:"RKT8000",name:"ROKKET 8000",price:449},
{id:"8",code:"RKT10000",name:"ROKKET 10000",price:549},
{id:"9",code:"CANNON",name:"CANNON",price:249},
{id:"10",code:"JS-VT",name:"TRICO",price:219},
{id:"11",code:"MINI-S (HWC)",name:"MINI-S (HWC)",price:1188},
{id:"12",code:"MINI-S (HW)",name:"MINI-S (HW)",price:1188},
{id:"13",code:"JS-V2",name:"NOVA",price:199}
];

const cart = {};

function renderProducts(){
    const grid = document.getElementById("productGrid");
    grid.innerHTML = products.map(p => `
        <div class="card" id="card-${p.id}">
            <div class="image">
                <div style="font-size:42px">💧</div>
            </div>
            <div class="product-code">${p.code}</div>
            <div class="name">${p.name}</div>
            <div class="price">$${p.price.toLocaleString()}</div>
            <button class="add" id="add-${p.id}" onclick="addToCart('${p.id}')">ADD</button>
            <div class="counter" id="counter-${p.id}">
                <button onclick="changeQty('${p.id}',-1)">−</button>
                <span class="qty" id="qty-${p.id}">1</span>
                <button onclick="changeQty('${p.id}',1)">+</button>
            </div>
        </div>
    `).join("");
}

function addToCart(id){
    cart[id] = 1;
    updateCard(id);
    updateMainButton();
}

function changeQty(id, delta){
    cart[id] = (cart[id] || 0) + delta;
    if(cart[id] <= 0) delete cart[id];
    updateCard(id);
    updateMainButton();
}

function updateCard(id){
    const add = document.getElementById(`add-${id}`);
    const counter = document.getElementById(`counter-${id}`);
    const qty = document.getElementById(`qty-${id}`);

    if(cart[id]){
        add.style.display = "none";
        counter.style.display = "flex";
        qty.textContent = cart[id];
    }else{
        add.style.display = "block";
        counter.style.display = "none";
    }
}

function getOrderData(){
    return {
        products: Object.entries(cart).map(([id, quantity]) => ({
            id: String(id),
            quantity: Number(quantity)
        }))
    };
}

function updateMainButton(){
    const totalItems = Object.values(cart).reduce((sum, qty) => sum + qty, 0);

    if(totalItems > 0){
        tg.MainButton.setText(`VIEW ORDER (${totalItems})`);
        tg.MainButton.setParams({
            color:"#0077c8",
            text_color:"#ffffff",
            is_active:true
        });
        tg.MainButton.show();
    }else{
        tg.MainButton.hide();
    }
}

tg.MainButton.onClick(() => {
    const orderData = getOrderData();

    if(!orderData.products.length){
        tg.showAlert("Please select at least one product.");
        return;
    }

    console.log("SENDING ORDER:", JSON.stringify(orderData));

    tg.MainButton.showProgress();

    tg.sendData(JSON.stringify(orderData));
});

renderProducts();
updateMainButton();
</script>
</body>
</html>
