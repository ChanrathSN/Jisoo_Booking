<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AquaLife Booking & Store</title>
  <!-- Telegram Web App SDK (Required) -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
      padding-bottom: 80px;
      user-select: none;
    }

    /* 2-Column Grid Layout */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px 16px;
    }

    /* Product Card */
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .image-wrapper {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .image-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .badge-new {
      position: absolute;
      bottom: 4px;
      right: 0px;
      background-color: #4eb851;
      color: white;
      font-size: 11px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .product-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--tg-theme-text-color, #000000);
    }

    .price-text {
      font-weight: 700;
    }

    .btn-add {
      width: 100%;
      max-width: 130px;
      padding: 8px 0;
      background-color: #f3a738;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn-buy {
      background-color: #4eb851;
    }

    .btn-add:active {
      transform: scale(0.96);
      opacity: 0.9;
    }

    .counter-wrapper {
      display: none;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 130px;
    }

    .btn-count {
      width: 36px;
      height: 36px;
      background-color: #f3a738;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .count-number {
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="grid-container">
    <!-- Item 1 -->
    <div class="product-card" id="card-1">
      <div class="image-wrapper">
        <img src="https://em-content.zobj.net/source/microsoft-teams/363/shortcake_1f370.png" alt="Cake">
        <span class="badge-new">NEW</span>
      </div>
      <div class="product-title">Cake · ⭐ <span class="price-text">1</span></div>
      <button class="btn-add btn-buy" onclick="addToCart(1)">BUY</button>
      <div class="counter-wrapper" id="counter-1">
        <button class="btn-count" onclick="changeQty(1, -1)">-</button>
        <span class="count-number" id="qty-1">1</span>
        <button class="btn-count" onclick="changeQty(1, 1)">+</button>
      </div>
    </div>

    <!-- Item 2 -->
    <div class="product-card" id="card-2">
      <div class="image-wrapper">
        <img src="https://em-content.zobj.net/source/microsoft-teams/363/hamburger_1f354.png" alt="Burger">
      </div>
      <div class="product-title">Burger · <span class="price-text">$4.99</span></div>
      <button class="btn-add" onclick="addToCart(2)">ADD</button>
      <div class="counter-wrapper" id="counter-2">
        <button class="btn-count" onclick="changeQty(2, -1)">-</button>
        <span class="count-number" id="qty-2">1</span>
        <button class="btn-count" onclick="changeQty(2, 1)">+</button>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    tg.MainButton.setText("VIEW ORDER");
    tg.MainButton.setTextColor("#FFFFFF");
    tg.MainButton.setBackgroundColor("#31b545");

    let cart = {};

    function addToCart(id) {
      cart[id] = 1;
      updateUI(id);
      updateMainButton();
    }

    function changeQty(id, delta) {
      cart[id] = (cart[id] || 0) + delta;
      if (cart[id] <= 0) {
        delete cart[id];
      }
      updateUI(id);
      updateMainButton();
    }

    function updateUI(id) {
      const card = document.getElementById(`card-${id}`);
      const btnAdd = card.querySelector('.btn-add');
      const counter = document.getElementById(`counter-${id}`);
      const qtyText = document.getElementById(`qty-${id}`);

      if (cart[id] > 0) {
        btnAdd.style.display = 'none';
        counter.style.display = 'flex';
        qtyText.innerText = cart[id];
      } else {
        btnAdd.style.display = 'block';
        counter.style.display = 'none';
      }
    }

    function updateMainButton() {
      const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
      if (totalItems > 0) {
        tg.MainButton.show();
      } else {
        tg.MainButton.hide();
      }
    }

    tg.MainButton.onClick(() => {
      tg.sendData(JSON.stringify(cart));
      tg.close();
    });
  </script>
</body>
</html>
