<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AquaLife Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--tg-theme-bg-color,#fff);color:var(--tg-theme-text-color,#000);padding:16px 16px 90px}
.header{text-align:center;margin-bottom:20px}
.header h1{font-size:24px;color:#0077c8}
.header p{font-size:13px;opacity:.7;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 14px}
.card{text-align:center;display:flex;flex-direction:column;align-items:center}
.image{width:120px;height:120px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;background:#f5f7f9;overflow:hidden}
.name{font-size:14px;font-weight:600;min-height:38px;margin-top:3px;display:flex;align-items:center;justify-content:center}
.price{font-size:15px;font-weight:700;margin:5px 0 9px}
.add{width:100%;max-width:130px;padding:9px;background:#0077c8;color:#fff;border:0;border-radius:9px;font-weight:700;font-size:14px;cursor:pointer}
.counter{display:none;width:100%;max-width:130px;align-items:center;justify-content:space-between}
.counter button{width:36px;height:36px;border:0;border-radius:8px;background:#0077c8;color:#fff;font-size:20px;font-weight:bold;cursor:pointer}
.qty{font-size:16px;font-weight:bold}

/* Modal Styling */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--tg-theme-bg-color,#fff);border-radius:16px;width:100%;max-width:400px;padding:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);display:flex;flex-direction:column;max-height:85vh}
.modal h2{font-size:20px;color:#0077c8;margin-bottom:12px;text-align:center}
.modal-body{overflow-y:auto;flex:1;margin-bottom:15px}
.review-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.review-item-name{font-weight:600;font-size:14px}
.review-item-qty{font-size:12px;color:#666}
.review-item-price{font-weight:700;font-size:14px}
.modal-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;padding:12px 0;border-top:2px solid #0077c8;margin-top:10px}
.modal-actions{display:flex;flex-direction:column;gap:8px}
.modal-actions-row{display:flex;gap:8px}
.btn-clear{width:100%;padding:10px;background:#e74c3c;color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
.btn-cancel{flex:1;padding:12px;background:#e5e5e5;color:#333;border:0;border-radius:8px;font-weight:700;cursor:pointer}
.btn-submit{flex:1;padding:12px;background:#0077c8;color:#fff;border:0;border-radius:8px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div class="header">
<h1>AquaLife Store 💧</h1>
<p>Select products and quantity</p>
</div>

<div class="grid" id="productGrid"></div>

<!-- Order Review Modal -->
<div class="modal-overlay" id="reviewModal">
  <div class="modal">
    <h2>📋 Order Summary</h2>
    <div class="modal-body" id="modalItems"></div>
    <div class="modal-total">
      <span>Total Amount:</span>
      <span id="modalGrandTotal">$0.00</span>
    </div>
    <div class="modal-actions">
      <div class="modal-actions-row">
        <button class="btn-cancel" onclick="closeModal()">Edit Order</button>
        <button class="btn-submit" onclick="submitOrder()">Submit Order</button>
      </div>
      <button class="btn-clear" onclick="clearCart()">🗑️ Clear Cart</button>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const products = [
{id:"1",name:"SAENG SU (TT)",price:449},
{id:"2",name:"SAENG SU (FS)",price:499},
{id:"3",name:"MNL(FS) - WHITE",price:799},
{id:"4",name:"SUPER COOLING",price:1188},
{id:"5",name:"JICO",price:219},
{id:"6",name:"ROKKET 5000",price:399},
{id:"7",name:"ROKKET 8000",price:449},
{id:"8",name:"ROKKET 10000",price:549},
{id:"9",name:"CANNON",price:249},
{id:"10",name:"TRICO",price:219},
{id:"11",name:"MINI-S (HWC)",price:1188},
{id:"12",name:"MINI-S (HW)",price:1188},
{id:"13",name:"NOVA",price:199}
];

const cart = {};

function renderProducts(){
    const grid = document.getElementById("productGrid");
    grid.innerHTML = products.map(p => `
        <div class="card" id="card-${p.id}">
            <div class="image">
                <div style="font-size:42px">💧</div>
            </div>
            <div class="name">${p.name}</div>
            <div class="price">$${p.price.toLocaleString()}</div>
            <button class="add" id="add-${p.id}" onclick="addToCart('${p.id}')">ADD TO CART</button>
            <div class="counter" id="counter-${p.id}">
                <button onclick="changeQty('${p.id}',-1)">−</button>
                <span class="qty" id="qty-${p.id}">1</span>
                <button onclick="changeQty('${p.id}',1)">+</button>
            </div>
        </div>
    `).join("");
}

function addToCart(id){
    cart[id] = 1;
    updateCard(id);
    updateMainButton();
}

function changeQty(id, delta){
    cart[id] = (cart[id] || 0) + delta;
    if(cart[id] <= 0) delete cart[id];
    updateCard(id);
    updateMainButton();
}

function updateCard(id){
    const add = document.getElementById(`add-${id}`);
    const counter = document.getElementById(`counter-${id}`);
    const qty = document.getElementById(`qty-${id}`);

    if(cart[id]){
        add.style.display = "none";
        counter.style.display = "flex";
        qty.textContent = cart[id];
    }else{
        add.style.display = "block";
        counter.style.display = "none";
    }
}

function updateMainButton(){
    const totalItems = Object.values(cart).reduce((sum, qty) => sum + qty, 0);

    if(totalItems > 0){
        tg.MainButton.setText(`VIEW CART (${totalItems})`);
        tg.MainButton.setParams({
            color:"#0077c8",
            text_color:"#ffffff",
            is_active:true
        });
        tg.MainButton.show();
    }else{
        tg.MainButton.hide();
    }
}

function openModal(){
    const modalItems = document.getElementById("modalItems");
    const modalGrandTotal = document.getElementById("modalGrandTotal");
    
    let total = 0;
    let html = "";

    Object.entries(cart).forEach(([id, qty]) => {
        const prod = products.find(p => p.id === id);
        if(prod){
            const itemTotal = prod.price * qty;
            total += itemTotal;
            html += `
                <div class="review-item">
                    <div>
                        <div class="review-item-name">${prod.name}</div>
                        <div class="review-item-qty">Qty: ${qty} × $${prod.price.toLocaleString()}</div>
                    </div>
                    <div class="review-item-price">$${itemTotal.toLocaleString()}</div>
                </div>
            `;
        }
    });

    modalItems.innerHTML = html;
    modalGrandTotal.textContent = `$${total.toLocaleString()}`;
    document.getElementById("reviewModal").style.display = "flex";
    tg.MainButton.hide();
}

function closeModal(){
    document.getElementById("reviewModal").style.display = "none";
    updateMainButton();
}

function clearCart(){
    Object.keys(cart).forEach(id => delete cart[id]);
    products.forEach(p => updateCard(p.id));
    closeModal();
}

function getOrderData(){
    return {
        products: Object.entries(cart).map(([id, quantity]) => ({
            id: String(id),
            quantity: Number(quantity)
        }))
    };
}

function submitOrder(){
    const orderData = getOrderData();
    tg.sendData(JSON.stringify(orderData));
    tg.close();
}

tg.MainButton.onClick(() => {
    openModal();
});

renderProducts();
updateMainButton();
</script>
</body>
</html>
