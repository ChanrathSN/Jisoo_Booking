<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini App</title>
    <!-- 1. Include the Telegram WebApp Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* 2. Use Telegram theme variables for a native look */
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            text-align: center;
        }
        .btn {
            background-color: var(--tg-theme-button-color, #248bca);
            color: var(--tg-theme-button-text-color, #ffffff);
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Welcome, <span id="username">User</span>!</h1>
    <p>This is a custom Mini App for my product.</p>
    <button class="btn" id="action-btn">Send Data Back</button>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expands the app to full height

        // Access User Data provided securely by Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Handle a click event to pass data back to the Telegram Bot chat
        document.getElementById('action-btn').addEventListener('click', () => {
            const dataToSend = { message: "Hello from the Mini App!" };
            
            // This sends a data payload back to the bot conversation
            tg.sendData(JSON.stringify(dataToSend));
            
            // Close the app automatically
            tg.close();
        });
    </script>
</body>
</html>
